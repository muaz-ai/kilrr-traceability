<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Master Data</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding-bottom: 50px; }
        .nav-top { background: #ffffff; border-bottom: 6px solid #ea580c; padding: 20px 35px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .brand { display: flex; align-items: center; gap: 15px; font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: 1px; text-decoration: none; text-transform: uppercase;}
        .brand img { height: 45px; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; width: 100%; justify-content: center; }
        @media(min-width: 1000px){ .nav-links { width: auto; margin-top: 0; } }
        .nav-btn { text-decoration: none; padding: 12px 20px; color: #475569; font-weight: 900; font-size: 15px; text-transform: uppercase; border-radius: 10px; transition: 0.3s; background: #f1f5f9; border: 2px solid transparent; letter-spacing: 1px;}
        .nav-btn:hover { background: #fff7ed; color: #ea580c; border-color: #ffedd5; transform: translateY(-2px);}
        .nav-btn.active { background: #ea580c; color: #ffffff; box-shadow: 0 6px 15px rgba(234, 88, 12, 0.3); }
        .nav-btn.logout { background: #fef2f2; color: #ef4444; } .nav-btn.logout:hover { background: #ef4444; color: #ffffff; border-color: #ef4444;}

        /* The Vault Lock Screen */
        #auth_wall { height: calc(100vh - 120px); display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #ffffff; padding: 60px 50px; border-radius: 24px; border: 4px solid #ef4444; text-align: center; box-shadow: 0 20px 50px rgba(239,68,68,0.15); width: 90%; max-width: 480px;}
        .auth-card h1 { font-family: 'Space Grotesk', sans-serif; color: #ef4444; font-size: 42px; font-weight: 900; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px;}
        .auth-card p { color: #475569; font-weight: 900; text-transform: uppercase; margin-bottom: 35px; letter-spacing: 1px; font-size: 15px;}
        .auth-card input { width: 100%; padding: 25px; box-sizing: border-box; border-radius: 16px; border: 3px solid #cbd5e1; background: #f8fafc; color: #0f172a; font-size: 28px; text-align: center; letter-spacing: 10px; margin-bottom: 30px; font-family: 'Space Grotesk', sans-serif;}
        .auth-card input:focus { border-color: #ef4444; outline: none; box-shadow: 0 0 0 5px rgba(239,68,68,0.2);}
        .auth-card button { width: 100%; background: #ef4444; color: white; border: none; padding: 25px; border-radius: 16px; font-size: 20px; font-weight: 900; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 8px 20px rgba(239,68,68,0.3); transition: 0.2s;}
        .auth-card button:hover { background: #dc2626; transform: translateY(-3px);}

        /* Spacious Master Data Layout */
        .container { max-width: 1400px; margin: 50px auto; padding: 0 20px; }
        
        .tab-menu { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 4px solid #e2e8f0; padding-bottom: 15px; overflow-x: auto;}
        .tab-btn { background: transparent; border: none; color: #64748b; font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 900; padding: 15px 30px; cursor: pointer; text-transform: uppercase; border-radius: 16px; transition: 0.2s; white-space: nowrap;}
        .tab-btn.active { background: #0f172a; color: white; box-shadow: 0 6px 20px rgba(15,23,42,0.2);}
        .tab-content { display: none; background: #ffffff; border: 2px solid #e2e8f0; border-radius: 24px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { margin: 0 0 30px 0; font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 900; color: #ea580c; text-transform: uppercase; letter-spacing: 1px; border-bottom: 3px solid #f1f5f9; padding-bottom: 20px;}
        
        .add-form { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; background: #f8fafc; padding: 30px; border-radius: 20px; border: 2px dashed #cbd5e1;}
        .add-form input { flex: 1; min-width: 250px; padding: 22px; border-radius: 12px; border: 2px solid #cbd5e1; background: #ffffff; color: #0f172a; font-size: 18px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; transition: 0.2s;}
        .add-form input:focus { border-color: #ea580c; outline: none; box-shadow: 0 0 0 5px rgba(234, 88, 12, 0.15);}
        .add-form button { background: #ea580c; color: white; border: none; padding: 0 40px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .add-form button:hover { background: #c2410c; transform: translateY(-2px);}
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .data-card { background: #ffffff; border: 2px solid #e2e8f0; padding: 25px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .data-card:hover { border-color: #cbd5e1; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05);}
        .li-text { display: flex; flex-direction: column; gap: 8px; }
        .li-code { font-family: 'Space Grotesk', monospace; color: #ea580c; font-weight: 900; font-size: 24px;}
        .li-name { color: #475569; font-size: 16px; font-weight: 800; text-transform: uppercase;}
        
        .btn-del { background: #fef2f2; color: #ef4444; border: 2px solid #fca5a5; padding: 12px 20px; border-radius: 12px; font-size: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        .btn-del:hover { background: #ef4444; color: white; }
        .btn-edit { background: #f0f9ff; color: #0ea5e9; border: 2px solid #bae6fd; padding: 12px 20px; border-radius: 12px; font-size: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-right: 10px;}
        .btn-edit:hover { background: #0ea5e9; color: white;}
        
        /* Recipe Specifics */
        .recipe-layout { display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media(min-width: 1024px){ .recipe-layout { grid-template-columns: 1fr 1fr; } }
        .builder-box { background: #f8fafc; padding: 40px; border-radius: 24px; border: 3px solid #e2e8f0; position: sticky; top: 120px;}
        
        .rec-select { width: 100%; padding: 22px; border-radius: 12px; background: #ffffff; color: #0f172a; border: 2px solid #cbd5e1; margin-bottom: 20px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; transition: 0.2s;}
        .rec-select:focus { border-color: #ea580c; outline: none; box-shadow: 0 0 0 5px rgba(234, 88, 12, 0.15);}
        .ing-row { display: flex; gap: 15px; margin-bottom: 15px; animation: fadeIn 0.3s ease-out;}
        
        .btn-save-rec { width: 100%; background: #10b981; color: white; border: none; padding: 25px; border-radius: 16px; font-weight: 900; font-size: 22px; cursor: pointer; margin-top: 30px; text-transform: uppercase; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); transition: 0.2s; letter-spacing: 2px;}
        .btn-save-rec:hover { background: #059669; transform: translateY(-3px);}
        .btn-secondary { width: 100%; background: #fff7ed; color: #ea580c; border: 3px dashed #ea580c; padding: 20px; border-radius: 16px; font-weight: 900; cursor: pointer; font-size: 18px; text-transform: uppercase; transition: 0.2s;}
        .btn-secondary:hover { background: #ffedd5; transform: translateY(-2px);}
    </style>
</head>
<body>
    <nav class="nav-top">
        <a href="index.html" class="brand"><img src="logo.png" alt="Kilrr" onerror="this.style.display='none'"> Factory OS</a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">🏠 HUB</a>
            <a href="inwarding.html" class="nav-btn">📦 INWARD</a>
            <a href="scanner.html" class="nav-btn">🏭 SCANNER</a>
            <a href="audit.html" class="nav-btn">📋 AUDIT</a>
            <a href="dashboard.html" class="nav-btn">📊 DASHBOARD</a>
            <a href="master.html" class="nav-btn active">⚙️ MASTER</a>
            <a href="/api/logout" class="nav-btn logout">🚪 EXIT</a>
        </div>
    </nav>
    
    <div id="auth_wall">
        <div class="auth-card">
            <h1>🔒 LOCKED</h1>
            <p>Master Level Clearance Required</p>
            <input type="password" id="vault_pass" placeholder="••••••••" autocomplete="off">
            <button onclick="unlock()">ACCESS VAULT</button>
        </div>
    </div>

    <div class="container" id="content" style="display:none;">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="showTab('rm', this)">📦 Raw Materials</button>
            <button class="tab-btn" onclick="showTab('ven', this)">🏢 Vendors</button>
            <button class="tab-btn" onclick="showTab('rec', this)">📋 Master Recipes</button>
        </div>

        <div id="tab_rm" class="tab-content active">
            <h2>Raw Materials Database</h2>
            <div class="add-form">
                <input type="text" id="iCode" placeholder="Material Code (e.g. JRA)" autocomplete="off">
                <input type="text" id="iName" placeholder="Full Ingredient Name" autocomplete="off">
                <button onclick="addIng()">➕ ADD MATERIAL</button>
            </div>
            <div class="data-grid" id="ing_list"></div>
        </div>

        <div id="tab_ven" class="tab-content">
            <h2>Approved Vendors</h2>
            <div class="add-form">
                <input type="text" id="vCode" placeholder="Vendor Code (e.g. V01)" autocomplete="off">
                <input type="text" id="vName" placeholder="Full Vendor Name" autocomplete="off">
                <button onclick="addVen()">➕ ADD VENDOR</button>
            </div>
            <div class="data-grid" id="ven_list"></div>
        </div>

        <div id="tab_rec" class="tab-content">
            <div class="recipe-layout">
                <div>
                    <h2>Existing Master Recipes</h2>
                    <p style="color:#64748b; font-weight:700; margin-bottom:30px;">Click Edit to load a recipe into the builder to modify ingredients.</p>
                    <div id="rec_list" style="display:flex; flex-direction:column; gap:20px;"></div>
                </div>
                
                <div class="builder-box">
                    <h2 style="color:#0f172a; border-color:#cbd5e1;">Recipe Builder</h2>
                    <input type="text" class="rec-select" id="rFgCode" placeholder="Flavour Name (e.g. Chaat Masala)" autocomplete="off">
                    <div id="rec_ings"></div>
                    <button class="btn-secondary" onclick="addRecipeRow()">+ Add Ingredient Row</button>
                    <button class="btn-save-rec" onclick="saveRecipe()">💾 SAVE / UPDATE RECIPE</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let vaultData=null; document.getElementById('vault_pass').addEventListener('keypress', e=>{if(e.key==='Enter')unlock();});
        
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('tab_' + id).classList.add('active');
            btn.classList.add('active');
        }

        async function unlock(){ const pwd=document.getElementById('vault_pass').value; const res=await fetch('/vault-access',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})}); const data=await res.json(); if(data.error)return alert("❌ Access Denied"); vaultData=data; document.getElementById('auth_wall').style.display='none'; document.getElementById('content').style.display='block'; render(); }
        
        function render(){ 
            document.getElementById('ing_list').innerHTML=vaultData.ingredients.map(i=>`<div class="data-card"><div class="li-text"><span class="li-code">${i.product_code}</span><span class="li-name">${i.ingredient_name}</span></div><button class="btn-del" onclick="delIng('${i.product_code}')">🗑️ Delete</button></div>`).join(''); 
            document.getElementById('ven_list').innerHTML=vaultData.vendors.map(v=>`<div class="data-card"><div class="li-text"><span class="li-code">${v.vendor_code}</span><span class="li-name">${v.vendor_name}</span></div><button class="btn-del" onclick="delVen('${v.vendor_code}')">🗑️ Delete</button></div>`).join(''); 
            
            const grouped=vaultData.recipes.reduce((acc,r)=>{acc[r.fg_code]=acc[r.fg_code]||[];acc[r.fg_code].push(r.product_code);return acc;},{}); 
            document.getElementById('rec_list').innerHTML=Object.entries(grouped).map(([fg,ings])=>`
                <div class="data-card" style="align-items:flex-start;">
                    <div class="li-text">
                        <span class="li-code">${fg}</span>
                        <span class="li-name" style="line-height:1.6; max-width:80%;">${ings.join(', ')}</span>
                    </div>
                    <div style="display:flex;">
                        <button class="btn-edit" onclick="editRecipe('${fg}')">✏️ Edit</button>
                        <button class="btn-del" onclick="delRecipe('${fg}')">🗑️</button>
                    </div>
                </div>
            `).join(''); 
        }
        
        async function refresh(){ const res=await fetch('/vault-access',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('vault_pass').value})}); vaultData=await res.json(); render(); }
        async function addIng(){ await fetch('/add-ingredient',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:document.getElementById('iCode').value,name:document.getElementById('iName').value})}); document.getElementById('iCode').value=''; document.getElementById('iName').value=''; refresh(); }
        async function delIng(code){ const pin=prompt("Manager PIN (1234):"); if(!pin)return; await fetch('/delete-ingredient',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,pin})}); refresh(); }
        async function addVen(){ await fetch('/add-vendor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:document.getElementById('vCode').value,name:document.getElementById('vName').value})}); document.getElementById('vCode').value=''; document.getElementById('vName').value=''; refresh(); }
        async function delVen(code){ const pin=prompt("Manager PIN (1234):"); if(!pin)return; await fetch('/delete-vendor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,pin})}); refresh(); }
        
        function addRecipeRow(preSelectedCode = ""){ 
            const div=document.createElement('div'); div.className='ing-row'; 
            let options = `<option value="">Select Material...</option>` + vaultData.ingredients.map(i=>`<option value="${i.product_code}" ${i.product_code === preSelectedCode ? 'selected' : ''}>${i.ingredient_name} (${i.product_code})</option>`).join('');
            div.innerHTML=`<select class="rec-select" style="margin:0;">${options}</select><button class="btn-del" style="border-radius:12px; margin:0; padding:0 25px; font-size:20px;" onclick="this.parentElement.remove()">X</button>`; 
            document.getElementById('rec_ings').appendChild(div); 
        }

        // 🔥 THE NEW EDIT RECIPE LOGIC 🔥
        function editRecipe(fgCode) {
            document.getElementById('rFgCode').value = fgCode;
            document.getElementById('rec_ings').innerHTML = ''; // clear builder
            const ingredients = vaultData.recipes.filter(r => r.fg_code === fgCode).map(r => r.product_code);
            ingredients.forEach(code => addRecipeRow(code));
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function delRecipe(fgCode) {
            const pin=prompt(`Manager PIN (1234) to delete recipe ${fgCode}:`); if(!pin)return; 
            // We use update-recipe with an empty array to effectively delete it
            await fetch('/update-recipe-secure',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fg_code:fgCode,ingredients:[],pin:pin})}); 
            refresh();
        }
        
        async function saveRecipe(){ const pin=prompt("Manager PIN (1234) to authorize saving/updating:"); if(!pin)return; const fg=document.getElementById('rFgCode').value; const selects=document.querySelectorAll('#rec_ings select'); let ings=[]; selects.forEach(s=>{if(s.value)ings.push(s.value);}); if(!fg||ings.length===0)return alert("Fill flavour name and add ingredients!"); await fetch('/update-recipe-secure',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fg_code:fg,ingredients:ings,pin:pin})}); alert("Recipe Saved Successfully!"); document.getElementById('rFgCode').value=''; document.getElementById('rec_ings').innerHTML=''; refresh(); }
    </script>
</body>
</html>
