<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Master Data</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#0f172a; color:#f8fafc; font-family:'Outfit',sans-serif; min-height:100vh;}
        nav { background:rgba(15,23,42,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #334155; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
        .nav-logo { display:flex; align-items:center; gap:15px; text-decoration:none; color:white;}
        .nav-logo img { height:35px; background:white; padding:4px; border-radius:6px; }
        .nav-logo span { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; letter-spacing:1px; text-transform:uppercase;}
        .home-btn { background:rgba(56,189,248,0.1); border:1px solid #38bdf8; color:#38bdf8; padding:8px 16px; border-radius:8px; text-decoration:none; font-weight:800; font-size:14px;}
        
        /* The Vault Lock Screen */
        #auth_wall { height:calc(100vh - 70px); display:flex; justify-content:center; align-items:center; background:radial-gradient(circle at center, #1e293b, #0f172a); }
        .auth-card { background:rgba(15,23,42,0.8); backdrop-filter:blur(20px); padding:50px 40px; border-radius:24px; border:2px solid #ef4444; text-align:center; box-shadow:0 0 50px rgba(239,68,68,0.2); width:90%; max-width:400px;}
        .auth-card h1 { font-family:'Space Grotesk',sans-serif; color:#ef4444; font-size:32px; font-weight:900; margin:0 0 10px 0; text-transform:uppercase; letter-spacing:2px;}
        .auth-card p { color:#94a3b8; margin-bottom:30px;}
        .auth-card input { width:100%; padding:18px; border-radius:12px; border:1px solid #475569; background:#0f172a; color:white; font-size:18px; text-align:center; letter-spacing:3px; margin-bottom:20px; font-family:'Space Grotesk',sans-serif;}
        .auth-card input:focus { border-color:#ef4444; outline:none; box-shadow:0 0 15px rgba(239,68,68,0.3);}
        .auth-card button { width:100%; background:linear-gradient(135deg, #ef4444, #b91c1c); color:white; border:none; padding:18px; border-radius:12px; font-size:16px; font-weight:900; font-family:'Outfit',sans-serif; text-transform:uppercase; letter-spacing:1px; cursor:pointer;}
        
        /* Master Data Content */
        .container { max-width:1200px; margin:30px auto; padding:0 20px; display:grid; grid-template-columns:1fr; gap:30px;}
        @media(min-width:1024px){ .container{grid-template-columns:1fr 1fr 1fr;} }
        
        .section { background:rgba(30,41,59,0.6); backdrop-filter:blur(10px); border:1px solid #334155; border-radius:20px; padding:25px; box-shadow:0 15px 30px rgba(0,0,0,0.3);}
        h2 { margin:0 0 20px 0; font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; color:#38bdf8; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #334155; padding-bottom:15px;}
        
        .add-form { display:flex; gap:10px; margin-bottom:20px;}
        .add-form input { flex:1; padding:12px; border-radius:8px; border:1px solid #475569; background:rgba(15,23,42,0.6); color:white; font-size:14px;}
        .add-form button { background:#38bdf8; color:#0f172a; border:none; padding:0 20px; border-radius:8px; font-weight:800; cursor:pointer;}
        
        ul { list-style:none; padding:0; margin:0; max-height:400px; overflow-y:auto; }
        li { background:rgba(15,23,42,0.4); border:1px solid #334155; margin-bottom:10px; padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center;}
        .li-text { display:flex; flex-direction:column; gap:4px; }
        .li-code { font-family:'Space Grotesk',monospace; color:#38bdf8; font-weight:700; font-size:15px;}
        .li-name { color:#e2e8f0; font-size:13px; text-transform:uppercase;}
        .btn-del { background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid #ef4444; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:800; cursor:pointer;}
        
        /* Recipe Specifics */
        .rec-select { width:100%; padding:12px; border-radius:8px; background:#0f172a; color:white; border:1px solid #475569; margin-bottom:10px;}
        .ing-row { display:flex; gap:10px; margin-bottom:10px;}
        .btn-save-rec { width:100%; background:linear-gradient(135deg, #10b981, #059669); color:white; border:none; padding:15px; border-radius:10px; font-weight:800; cursor:pointer; margin-top:10px;}
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><img src="logo.png" alt="Kilrr" onerror="this.style.display='none'"><span>MASTER DATA</span></a>
        <a href="index.html" class="home-btn">🏠 Hub</a>
    </nav>
    
    <div id="auth_wall">
        <div class="auth-card">
            <h1>LOCKED</h1>
            <p>Master Level Clearance Required</p>
            <input type="password" id="vault_pass" placeholder="••••••••">
            <button onclick="unlock()">ACCESS VAULT</button>
        </div>
    </div>

    <div class="container" id="content" style="display:none;">
        <div class="section">
            <h2>Raw Materials</h2>
            <div class="add-form"><input type="text" id="iCode" placeholder="Code (e.g. JRA)"><input type="text" id="iName" placeholder="Name"><button onclick="addIng()">Add</button></div>
            <ul id="ing_list"></ul>
        </div>
        <div class="section">
            <h2>Vendors</h2>
            <div class="add-form"><input type="text" id="vCode" placeholder="Code (e.g. V01)"><input type="text" id="vName" placeholder="Name"><button onclick="addVen()">Add</button></div>
            <ul id="ven_list"></ul>
        </div>
        <div class="section">
            <h2>Recipe Builder</h2>
            <input type="text" class="rec-select" id="rFgCode" placeholder="New Flavour Name (e.g. Chaat Masala)">
            <div id="rec_ings"></div>
            <button class="btn-secondary" style="width:100%; padding:10px; border-radius:8px; background:rgba(56,189,248,0.1); color:#38bdf8; border:1px solid #38bdf8; cursor:pointer;" onclick="addRecipeRow()">+ Add Ingredient Row</button>
            <button class="btn-save-rec" onclick="saveRecipe()">💾 SAVE RECIPE</button>
            <h3 style="color:#94a3b8; font-size:14px; margin-top:30px; border-bottom:1px solid #334155; padding-bottom:10px;">Existing Recipes</h3>
            <ul id="rec_list"></ul>
        </div>
    </div>
    
    <script>
        let vaultData = null;
        async function unlock() {
            const pwd = document.getElementById('vault_pass').value;
            const res = await fetch('/vault-access', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
            const data = await res.json();
            if(data.error) return alert("❌ Access Denied");
            vaultData = data; document.getElementById('auth_wall').style.display='none'; document.getElementById('content').style.display='grid'; render();
        }
        function render() {
            document.getElementById('ing_list').innerHTML = vaultData.ingredients.map(i => `<li><div class="li-text"><span class="li-code">${i.product_code}</span><span class="li-name">${i.ingredient_name}</span></div><button class="btn-del" onclick="delIng('${i.product_code}')">Del</button></li>`).join('');
            document.getElementById('ven_list').innerHTML = vaultData.vendors.map(v => `<li><div class="li-text"><span class="li-code">${v.vendor_code}</span><span class="li-name">${v.vendor_name}</span></div><button class="btn-del" onclick="delVen('${v.vendor_code}')">Del</button></li>`).join('');
            const grouped = vaultData.recipes.reduce((acc, r) => { acc[r.fg_code] = acc[r.fg_code]||[]; acc[r.fg_code].push(r.product_code); return acc; }, {});
            document.getElementById('rec_list').innerHTML = Object.entries(grouped).map(([fg, ings]) => `<li><div class="li-text"><span class="li-code">${fg}</span><span class="li-name">${ings.join(', ')}</span></div></li>`).join('');
        }
        async function refresh() { const res = await fetch('/vault-access', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('vault_pass').value})}); vaultData = await res.json(); render(); }
        async function addIng() { await fetch('/add-ingredient', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:document.getElementById('iCode').value, name:document.getElementById('iName').value})}); refresh(); }
        async function delIng(code) { const pin = prompt("Manager PIN (1234):"); if(!pin) return; await fetch('/delete-ingredient', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code, pin})}); refresh(); }
        async function addVen() { await fetch('/add-vendor', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:document.getElementById('vCode').value, name:document.getElementById('vName').value})}); refresh(); }
        async function delVen(code) { const pin = prompt("Manager PIN (1234):"); if(!pin) return; await fetch('/delete-vendor', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code, pin})}); refresh(); }
        
        function addRecipeRow() {
            const div = document.createElement('div'); div.className = 'ing-row';
            div.innerHTML = `<select class="rec-select" style="margin:0;"><option value="">Select Material...</option>${vaultData.ingredients.map(i => `<option value="${i.product_code}">${i.ingredient_name} (${i.product_code})</option>`).join('')}</select><button class="btn-del" style="border-radius:8px;" onclick="this.parentElement.remove()">X</button>`;
            document.getElementById('rec_ings').appendChild(div);
        }
        async function saveRecipe() {
            const pin = prompt("Manager PIN (1234) to authorize recipe save:"); if(!pin) return;
            const fg = document.getElementById('rFgCode').value;
            const selects = document.querySelectorAll('#rec_ings select');
            let ings = []; selects.forEach(s => { if(s.value) ings.push(s.value); });
            if(!fg || ings.length===0) return alert("Fill flavour name and add ingredients!");
            await fetch('/update-recipe-secure', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fg_code:fg, ingredients:ings, pin:pin})});
            alert("Recipe Saved!"); document.getElementById('rFgCode').value = ''; document.getElementById('rec_ings').innerHTML = ''; refresh();
        }
    </script>
</body>
</html>
