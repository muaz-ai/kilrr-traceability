<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#0f172a; color:#f8fafc; font-family:'Outfit',sans-serif; min-height:100vh; padding-bottom:50px;}
        nav { background:rgba(15,23,42,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #334155; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
        .nav-logo { display:flex; align-items:center; gap:15px; text-decoration:none; color:white;}
        .nav-logo img { height:35px; background:white; padding:4px; border-radius:6px; }
        .nav-logo span { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; letter-spacing:1px; text-transform:uppercase;}
        .home-btn { background:rgba(56,189,248,0.1); border:1px solid #38bdf8; color:#38bdf8; padding:8px 16px; border-radius:8px; text-decoration:none; font-weight:800; font-size:14px;}
        
        .container { max-width:1200px; margin:30px auto; padding:0 20px;}
        
        /* Stats Grid */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:40px; }
        .stat-card { background:rgba(30,41,59,0.6); border:1px solid #334155; padding:25px; border-radius:16px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.2);}
        .stat-val { font-family:'Space Grotesk',sans-serif; font-size:40px; font-weight:700; color:#38bdf8; margin-bottom:5px;}
        .stat-lbl { color:#94a3b8; font-size:13px; text-transform:uppercase; letter-spacing:1px; font-weight:800;}
        
        /* Table Sections */
        .section { background:rgba(30,41,59,0.6); backdrop-filter:blur(10px); border:1px solid #334155; border-radius:20px; padding:25px; margin-bottom:30px; box-shadow:0 15px 30px rgba(0,0,0,0.3);}
        .sec-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #334155; padding-bottom:15px;}
        h2 { margin:0; font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; color:#f8fafc; text-transform:uppercase; letter-spacing:1px;}
        
        .btn-export { background:rgba(16,185,129,0.1); border:1px solid #10b981; color:#34d399; font-family:'Outfit',sans-serif; font-weight:800; padding:10px 20px; border-radius:8px; cursor:pointer; transition:0.3s;}
        .btn-export:hover { background:#10b981; color:#0f172a;}
        .btn-del { background:transparent; border:none; color:#ef4444; cursor:pointer; font-size:14px; font-weight:800;}
        
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; text-align:left; font-size:14px;}
        th { background:rgba(15,23,42,0.8); color:#94a3b8; padding:15px; font-weight:800; text-transform:uppercase; letter-spacing:1px; font-size:12px; white-space:nowrap;}
        td { padding:15px; border-bottom:1px solid #1e293b; color:#e2e8f0; white-space:nowrap;}
        tr:hover { background:rgba(15,23,42,0.4); }
        .tag-style { font-family:'Space Grotesk',monospace; color:#38bdf8; font-weight:700;}
        .badge { padding:4px 8px; border-radius:6px; font-size:11px; font-weight:800;}
        .bg-open { background:rgba(56,189,248,0.2); color:#38bdf8;}
        .bg-locked { background:rgba(16,185,129,0.2); color:#34d399;}
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><img src="logo.png" alt="Kilrr" onerror="this.style.display='none'"><span>MANAGER DASHBOARD</span></a>
        <a href="index.html" class="home-btn">🏠 Hub</a>
    </nav>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="st_inw">0</div><div class="stat-lbl">Logs Inwarded</div></div>
            <div class="stat-card"><div class="stat-val" id="st_bat">0</div><div class="stat-lbl">Batches Produced</div></div>
            <div class="stat-card"><div class="stat-val" id="st_inv">0</div><div class="stat-lbl">Bags in Inventory</div></div>
        </div>

        <div class="section">
            <div class="sec-header"><h2>1. RM Inwarding Logs</h2><button class="btn-export" onclick="exp('inw_t', 'Inwarding')">📥 Export CSV</button></div>
            <div class="table-wrap"><table id="inw_t"><thead><tr><th>Date</th><th>Material</th><th>Code</th><th>Vendor</th><th>V-Code</th><th>Wt</th><th>Packs</th><th>Action</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div class="section">
            <div class="sec-header"><h2>2. Production Batches</h2><button class="btn-export" onclick="exp('bat_t', 'Batches')">📥 Export CSV</button></div>
            <div class="table-wrap"><table id="bat_t"><thead><tr><th>Date</th><th>Batch</th><th>Flavour</th><th>Status</th><th>Operator</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div class="section">
            <div class="sec-header"><h2>3. Live Inventory & Audit</h2><button class="btn-export" onclick="exp('inv_t', 'Inventory')">📥 Export CSV</button></div>
            <div class="table-wrap"><table id="inv_t"><thead><tr><th>RM Tag</th><th>Material</th><th>Current Wt</th><th>Last Audited</th><th>Action</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>
    <script>
        window.onload = async () => {
            const iRes = await fetch('/get-inwarding-logs'); const inw = await iRes.json();
            document.getElementById('st_inw').innerText = inw.length;
            document.querySelector('#inw_t tbody').innerHTML = inw.map(r => `<tr><td>${r.date_received}</td><td>${r.ingredient_name}</td><td>${r.ingredient_code}</td><td>${r.vendor_name}</td><td>${r.vendor_code}</td><td>${r.weight}kg</td><td>${r.packs}</td><td><button class="btn-del" onclick="delInw(${r.id})">Del</button></td></tr>`).join('');

            const bRes = await fetch('/all-batches'); const bat = await bRes.json();
            document.getElementById('st_bat').innerText = bat.length;
            document.querySelector('#bat_t tbody').innerHTML = bat.map(r => `<tr><td>${new Date(r.created_at).toLocaleDateString()}</td><td class="tag-style">${r.batch_code}</td><td>${r.fg_code}</td><td><span class="badge ${r.status==='OPEN'?'bg-open':'bg-locked'}">${r.status}</span></td><td>${r.operator_name||'N/A'}</td></tr>`).join('');

            const invRes = await fetch('/get-inventory'); const inv = await invRes.json();
            document.getElementById('st_inv').innerText = inv.length;
            document.querySelector('#inv_t tbody').innerHTML = inv.map(r => `<tr><td class="tag-style">${r.rm_tag}</td><td>${r.ingredient_name||r.product_code}</td><td style="color:#34d399;font-weight:bold;">${r.current_weight} kg</td><td>${new Date(r.last_audited).toLocaleString()}</td><td><button class="btn-del" onclick="delInv('${r.rm_tag}')">Del</button></td></tr>`).join('');
        };
        function delInw(id) { const pin = prompt("Manager PIN (1234):"); if(!pin) return; fetch('/delete-inwarding-log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, pin})}).then(()=>location.reload()); }
        function delInv(tag) { const pin = prompt("Manager PIN (1234):"); if(!pin) return; fetch('/delete-inventory', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rm_tag:tag, pin})}).then(()=>location.reload()); }
        function exp(tabId, name) {
            let csv = []; let rows = document.querySelectorAll(`#${tabId} tr`);
            for(let i=0; i<rows.length; i++) {
                let row=[], cols=rows[i].querySelectorAll("td, th");
                for(let j=0; j<cols.length-1; j++) row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
                csv.push(row.join(","));
            }
            let a = document.createElement("a"); a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv.join("\n")); a.target = '_blank'; a.download = `${name}_${new Date().toLocaleDateString()}.csv`; a.click();
        }
    </script>
</body>
</html>
