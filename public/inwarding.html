<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kilrr Traceability - RM Inwarding</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* 🔥 PREMIUM INDUSTRIAL + AMBIENT RESET 🔥 */
        :root {
            --kilrr-orange: #ea580c;
            --kilrr-orange-hover: #c2410c;
            --navy-command: #0b1121;
            --card-white: rgba(255, 255, 255, 0.95); /* Slight transparency to let the glow bleed through */
            --text-dark: #0f172a;
            --text-mid: #334155;
            --border-heavy: #cbd5e1;
            --success-green: #059669;
            --danger-red: #dc2626;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: var(--text-dark); 
            margin: 0; 
            padding-bottom: 80px; 
            -webkit-font-smoothing: antialiased; 
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* 🔥 THE GLOWING AMBIENT ORBS (From the previous design) 🔥 */
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.6; animation: floatOrb 15s ease-in-out infinite alternate; pointer-events: none;}
        .orb-1 { width: 600px; height: 600px; background: rgba(234, 88, 12, 0.35); top: -100px; left: -150px; }
        .orb-2 { width: 700px; height: 700px; background: rgba(56, 189, 248, 0.25); bottom: -200px; right: -150px; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(60px) scale(1.1); } }

        /* 🔥 THE NAVY COMMAND BAR 🔥 */
        .nav-top { background: var(--navy-command); border-bottom: 6px solid var(--kilrr-orange); padding: 0 40px; display: flex; justify-content: space-between; align-items: center; height: 90px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .brand { display: flex; align-items: center; gap: 15px; font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 900; color: #ffffff; text-decoration: none; text-transform: uppercase; letter-spacing: 2px;}
        .brand img { height: 45px; background: white; padding: 5px; border-radius: 8px;}
        .brand span { color: var(--kilrr-orange); }
        
        .nav-links { display: flex; gap: 8px; height: 100%; align-items: center;}
        .nav-btn { text-decoration: none; padding: 14px 22px; color: #94a3b8; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; border-radius: 8px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;}
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: #ffffff; }
        .nav-btn.active { color: #ffffff; background: var(--kilrr-orange); box-shadow: 0 4px 15px rgba(234, 88, 12, 0.4); }
        .nav-btn.logout { color: #fca5a5; border: 2px solid #ef4444; padding: 12px 20px;} 
        .nav-btn.logout:hover { background: #ef4444; color: #ffffff; }

        /* 🔥 WIDE, SPACIOUS GRID 🔥 */
        .container { max-width: 1500px; margin: 40px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr; gap: 40px;}
        @media(min-width: 1024px){ .container{grid-template-columns: 1fr 1fr;} }
        
        /* 🔥 BOLD HEAVY-DUTY CARDS 🔥 */
        .card { background: var(--card-white); backdrop-filter: blur(20px); border: 2px solid var(--border-heavy); border-radius: 20px; padding: 50px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--kilrr-orange); }
        .card-right::before { background: var(--success-green); }

        h2 { margin: 0 0 35px 0; font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 900; color: var(--text-dark); text-transform: uppercase; letter-spacing: 1px; border-bottom: 3px solid #e2e8f0; padding-bottom: 20px;}
        
        /* 🔥 MASSIVE HIGH-VISIBILITY INPUTS 🔥 */
        .form-group { margin-bottom: 30px; }
        label { display: block; font-size: 16px; font-weight: 800; color: var(--text-mid); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        
        input, select { width: 100%; padding: 22px; box-sizing: border-box; border-radius: 12px; border: 3px solid var(--border-heavy); font-size: 20px; font-family: 'Inter', sans-serif; font-weight: 700; color: var(--text-dark); background: #ffffff; transition: all 0.2s ease;}
        input:focus, select:focus { border-color: var(--kilrr-orange); outline: none; box-shadow: 0 0 0 5px rgba(234, 88, 12, 0.15); }
        input::placeholder { color: #94a3b8; font-weight: 600; }

        .print-range-row { display: flex; gap: 25px; margin-bottom: 40px; }
        .print-range-row > div { flex: 1; }
        .print-range-row input { text-align: center; font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 900; color: var(--kilrr-orange);}

        /* 🔥 CUSTOM DROPDOWNS 🔥 */
        .custom-dropdown-container { position: relative; width: 100%; }
        .custom-dropdown-list { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: #ffffff; border: 3px solid var(--kilrr-orange); border-radius: 12px; max-height: 350px; overflow-y: auto; z-index: 9999; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2); display: none; padding: 10px; }
        .custom-dropdown-item { padding: 18px 20px; font-size: 18px; font-weight: 700; color: var(--text-dark); border-radius: 8px; cursor: pointer; transition: 0.1s; margin-bottom: 4px; border: 2px solid transparent;}
        .custom-dropdown-item:hover, .custom-dropdown-item.active-item { background: #fff7ed; color: var(--kilrr-orange); border-color: #ffedd5;}

        /* 🔥 HEAVY INDUSTRIAL BUTTONS 🔥 */
        button { width: 100%; padding: 25px; border: none; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 900; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.2s ease; margin-bottom: 15px; }
        
        .btn-primary { background: var(--kilrr-orange); color: #ffffff; box-shadow: 0 10px 25px rgba(234, 88, 12, 0.3); }
        .btn-primary:hover { background: var(--kilrr-orange-hover); transform: translateY(-2px); box-shadow: 0 15px 35px rgba(234, 88, 12, 0.4); }
        
        .btn-secondary { background: #f8fafc; color: var(--text-mid); border: 3px solid var(--border-heavy); }
        .btn-secondary:hover { background: #e2e8f0; color: var(--text-dark); border-color: #94a3b8; }

        .btn-print { background: var(--success-green); color: white; font-size: 24px; margin-top: 15px; box-shadow: 0 10px 25px rgba(5, 150, 105, 0.3);}
        .btn-print:hover { background: #047857; transform: translateY(-2px); box-shadow: 0 15px 35px rgba(5, 150, 105, 0.4);}
        
        .btn-remove-queue { width: auto; padding: 12px 20px; margin: 0; font-size: 16px; background: #ffffff; color: var(--danger-red); border: 2px solid #fecaca; border-radius: 8px; font-weight: 800;}
        .btn-remove-queue:hover { background: #fef2f2; border-color: #f87171;}

        /* 🔥 CLEAN PREVIEW & QUEUE 🔥 */
        .print-preview { background: #ffffff; padding: 50px; text-align: center; border-radius: 16px; margin-bottom: 35px; border: 3px dashed var(--border-heavy); display: flex; justify-content: center; align-items: center; min-height: 250px; transition: border-color 0.2s;}
        .print-preview.active-preview { border-style: solid; border-color: var(--border-heavy); background: #f8fafc; }
        
        #queueList { margin-bottom: 35px; }
        .queue-item { background: #ffffff; padding: 25px 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border: 2px solid var(--border-heavy); box-shadow: 0 4px 10px rgba(0,0,0,0.05);}

        /* 🔥 FUNCTIONAL SAFETY TOGGLE 🔥 */
        .toggle-box { background: #fff7ed; padding: 25px 30px; border-radius: 12px; border: 3px solid #ffedd5; margin-bottom: 35px; display: flex; align-items: center; gap: 25px; cursor: pointer; transition: 0.2s; }
        .toggle-box:hover { border-color: #fdba74; background: #ffedd5;}
        .toggle-box input[type="checkbox"] { width: 35px; height: 35px; margin: 0; cursor: pointer; accent-color: var(--kilrr-orange);}
        .toggle-text { display: flex; flex-direction: column; gap: 6px; }
        .toggle-title { color: var(--kilrr-orange); font-size: 20px; font-weight: 900; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 1px;}
        .toggle-desc { color: var(--text-mid); font-size: 15px; font-weight: 600; line-height: 1.4;}
        
        @media (max-width: 1024px) {
            .nav-top { padding: 0 20px; height: auto; padding-top: 15px; padding-bottom: 15px; }
            .container { padding: 0 20px; }
            .card { padding: 30px; }
            .print-range-row { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <nav class="nav-top">
        <a href="index.html" class="brand">
            <img src="logo.png" alt="Kilrr" onerror="this.style.display='none'">
            <span>Factory</span> OS
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Hub</a>
            <a href="inwarding.html" class="nav-btn active">Inwarding</a>
            <a href="scanner.html" class="nav-btn">Scanner</a>
            <a href="audit.html" class="nav-btn">Audit</a>
            <a href="dashboard.html" class="nav-btn">Dashboard</a>
            <a href="master.html" class="nav-btn">Master Data</a>
            <a href="/api/logout" class="nav-btn logout">Exit</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="card card-left">
            <h2>Material Intake Setup</h2>
            
            <div style="display:flex; gap:25px;">
                <div class="form-group" style="flex:1;">
                    <label>Date Received</label>
                    <input type="date" id="date" onchange="updatePreview()">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Net Wt / Bag (KG)</label>
                    <input type="number" id="wt" placeholder="e.g. 25" oninput="updatePreview()">
                </div>
            </div>
            
            <div class="form-group">
                <label>Raw Material Database</label>
                <div class="custom-dropdown-container">
                    <input type="text" id="ing_input" placeholder="Type to search Material..." autocomplete="off">
                </div>
                <input type="hidden" id="ing_code"><input type="hidden" id="ing_name">
            </div>
            
            <div class="form-group">
                <label>Approved Vendor</label>
                <div class="custom-dropdown-container">
                    <input type="text" id="ven_input" placeholder="Type to search Vendor..." autocomplete="off">
                </div>
                <input type="hidden" id="ven_code"><input type="hidden" id="ven_name">
            </div>
            
            <div class="print-range-row">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Total Bags</label>
                    <input type="number" id="packs" placeholder="Qty" oninput="autoFillRange(); updatePreview();">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Print Start</label>
                    <input type="number" id="start_no" placeholder="1" oninput="updatePreview()">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Print End</label>
                    <input type="number" id="end_no" placeholder="Max" oninput="updatePreview()">
                </div>
            </div>

            <button class="btn-primary" onclick="addToQueue()">Stage To Print Queue</button>
            <button class="btn-secondary" onclick="clearForm()">Reset Interface</button>
        </div>

        <div class="card card-right">
            <h2>Print Execution Engine</h2>
            
            <div class="form-group" style="display: none;">
                <select id="printer_size"><option value="75x75">75mm x 75mm</option></select>
            </div>
            
            <label>Live Label Preview (First Tag)</label>
            <div class="print-preview" id="previewBox">
                <span style="color:#94a3b8; font-weight:800; font-size:20px;">Awaiting Data Input...</span>
            </div>
            
            <label>Active Print Queue</label>
            <div id="queueList">
                <span style="color:#94a3b8; font-size: 16px; font-weight: 600;">No labels staged.</span>
            </div>

            <div class="toggle-box" onclick="toggleCheckbox()">
                <input type="checkbox" id="log_db_check" checked onclick="event.stopPropagation()">
                <div class="toggle-text">
                    <span class="toggle-title">Sync to Cloud Database</span>
                    <span class="toggle-desc">UNCHECK this box if you are re-printing damaged tags to prevent duplicate inventory.</span>
                </div>
            </div>

            <button class="btn-print" onclick="printAll()">Execute Print Sequence</button>
        </div>
    </div>
    
    <script>
        let queue=[]; document.getElementById('date').valueAsDate=new Date();
        
        function toggleCheckbox() { const cb = document.getElementById('log_db_check'); cb.checked = !cb.checked; }
        function autoFillRange() { const total = document.getElementById('packs').value; if(total) { document.getElementById('start_no').value = 1; document.getElementById('end_no').value = total; } else { document.getElementById('start_no').value = ''; document.getElementById('end_no').value = ''; } }

        // Keyboard Supported Dropdown Engine
        function attachCustomDropdown(inputId, dataArray, searchKey, displayKey, codeKey, nameHiddenId, codeHiddenId) {
            const inp = document.getElementById(inputId); 
            const list = document.createElement('div'); 
            list.className = 'custom-dropdown-list'; 
            inp.parentNode.appendChild(list);
            let currentFocus = -1;

            function renderList(filterTxt = "") {
                list.innerHTML = ''; 
                currentFocus = -1;
                const matches = dataArray.filter(item => item[searchKey].toLowerCase().includes(filterTxt.toLowerCase()) || item[codeKey].toLowerCase().includes(filterTxt.toLowerCase()));
                if(matches.length === 0) { list.style.display = 'none'; return; }
                
                matches.forEach(match => {
                    let div = document.createElement('div'); 
                    div.className = 'custom-dropdown-item'; 
                    div.innerHTML = `<strong style="color:#ea580c;">${match[codeKey]}</strong> - ${match[displayKey]}`;
                    div.onclick = () => { selectItem(match); };
                    list.appendChild(div);
                });
                list.style.display = 'block';
            }

            function selectItem(match) {
                inp.value = match[displayKey]; 
                document.getElementById(nameHiddenId).value = match[displayKey]; 
                document.getElementById(codeHiddenId).value = match[codeKey]; 
                list.style.display = 'none'; 
                updatePreview();
            }

            inp.addEventListener('input', function() { renderList(this.value); }); 
            inp.addEventListener('focus', function() { renderList(this.value); });

            inp.addEventListener('keydown', function(e) {
                let items = list.getElementsByClassName('custom-dropdown-item');
                if (e.key === 'ArrowDown') {
                    e.preventDefault(); currentFocus++; addActive(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault(); currentFocus--; addActive(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (currentFocus > -1 && items.length > 0) { items[currentFocus].click(); }
                }
            });

            function addActive(items) {
                if (!items || items.length === 0) return false;
                removeActive(items);
                if (currentFocus >= items.length) currentFocus = 0;
                if (currentFocus < 0) currentFocus = (items.length - 1);
                items[currentFocus].classList.add('active-item');
                items[currentFocus].scrollIntoView({ block: 'nearest' });
            }

            function removeActive(items) {
                for (let i = 0; i < items.length; i++) items[i].classList.remove('active-item');
            }

            document.addEventListener('click', function(e) { if(e.target !== inp) list.style.display = 'none'; });
        }

        window.onload=async()=>{ 
            const iRes=await fetch('/get-ingredients'); const ingredients=await iRes.json();
            const vRes=await fetch('/get-vendors'); const vendors=await vRes.json(); 
            attachCustomDropdown('ing_input', ingredients, 'ingredient_name', 'ingredient_name', 'product_code', 'ing_name', 'ing_code');
            attachCustomDropdown('ven_input', vendors, 'vendor_name', 'vendor_name', 'vendor_code', 'ven_name', 'ven_code');
        };

        function updatePreview() {
            const iName = document.getElementById('ing_name').value, iCode = document.getElementById('ing_code').value, vCode = document.getElementById('ven_code').value, dateRaw = document.getElementById('date').value, startNo = document.getElementById('start_no').value || "1", wt = document.getElementById('wt').value || "0";
            const pBox = document.getElementById('previewBox');

            if(!iCode || !vCode) { 
                pBox.innerHTML=`<span style="color:#94a3b8; font-weight:800; font-size:20px;">Awaiting Data Input...</span>`; 
                pBox.classList.remove('active-preview');
                return; 
            }
            
            pBox.classList.add('active-preview');

            const dObj = new Date(dateRaw); const dd = String(dObj.getDate()).padStart(2, '0'); const mm = String(dObj.getMonth()+1).padStart(2, '0'); const yyyy = dObj.getFullYear();
            const displayDate = `${dd}/${mm}/${yyyy}`; const barcodeDate = `${dd}${mm}`; const bc = `${barcodeDate}/${iCode}/${vCode}/${startNo}`;

            pBox.innerHTML=`
                <div style="font-family: Arial, sans-serif; color: black; max-width: 280px; margin: 0 auto; text-align: center;">
                    <h2 style="margin:0 0 8px 0; font-size:28px; text-transform:uppercase; font-weight:900; border:none; padding:0; letter-spacing:0;">${iName}</h2>
                    <div style="margin:0 0 12px 0; font-size:16px; font-weight:bold;">Mat: ${iCode} | Ven: ${vCode}</div>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${bc}" style="margin:0 0 8px 0; width:180px; height:180px; border:3px solid black; padding:4px; border-radius:4px;">
                    <div style="margin:0 0 10px 0; font-size:22px; font-weight:900; font-family:Arial, sans-serif;">${bc}</div>
                    <div style="margin:0 0 5px 0; font-size:16px; font-weight:bold;">Date: ${displayDate}</div>
                    <div style="margin:0; font-size:16px; font-weight:bold;">Net Wt: ${wt} KG</div>
                </div>
            `;
        }

        function addToQueue(){ 
            const iName = document.getElementById('ing_name').value, iCode = document.getElementById('ing_code').value, vName = document.getElementById('ven_input').value, vCode = document.getElementById('ven_code').value, date = document.getElementById('date').value, wt = document.getElementById('wt').value;
            const startNo = parseInt(document.getElementById('start_no').value), endNo = parseInt(document.getElementById('end_no').value);
            const packs = document.getElementById('packs').value || (endNo - startNo + 1);
            
            if(!iCode || !vCode || !wt || isNaN(startNo) || isNaN(endNo)) return alert("Please select material and vendor from the dropdown lists!"); 
            if(startNo > endNo) return alert("Start No. cannot be greater than End No!");
            
            const dObj = new Date(date); const ddmm = `${String(dObj.getDate()).padStart(2, '0')}${String(dObj.getMonth()+1).padStart(2, '0')}`;
            queue.push({ dateRaw: date, dateFmt: ddmm, ingName: iName, ingCode: iCode, venName: vName, venCode: vCode, weight: wt, packs: packs, startNo: startNo, endNo: endNo }); 
            renderQueue(); clearForm(false); 
        }

        function renderQueue(){ 
            if(queue.length===0){
                document.getElementById('queueList').innerHTML="<span style='color:#94a3b8; font-size: 16px; font-weight: 600;'>No labels staged.</span>";
                return;
            } 
            
            document.getElementById('queueList').innerHTML=queue.map((q,idx)=> { 
                const numTags = q.endNo - q.startNo + 1; 
                return `
                <div class="queue-item">
                    <div>
                        <span style="color:#0f172a; font-size:20px; font-weight:800; display:block; margin-bottom:6px;">${q.ingName} <span style="color:#ea580c;">(${q.weight}kg)</span></span>
                        <span style="color:#475569; font-size:15px; font-weight:600;">Printing ${numTags} tags (Bag ${q.startNo} to ${q.endNo})</span>
                    </div>
                    <button class="btn-remove-queue" onclick="removeFromQueue(${idx})">🗑️ Remove</button>
                </div>`; 
            }).join(''); 
        }

        function removeFromQueue(index) {
            queue.splice(index, 1);
            renderQueue();
        }

        function clearForm(full=true){ 
            document.getElementById('ing_input').value=''; document.getElementById('ing_code').value=''; document.getElementById('ing_name').value=''; document.getElementById('packs').value=''; document.getElementById('start_no').value=''; document.getElementById('end_no').value='';
            if(full){document.getElementById('ven_input').value=''; document.getElementById('ven_code').value=''; document.getElementById('wt').value='';} 
            updatePreview();
        }

        async function printAll(){ 
            if(queue.length===0) return alert("Print queue is empty!"); 
            const shouldLog = document.getElementById('log_db_check').checked;
            if(shouldLog) { await fetch('/log-inwarding',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue})}); }
            
            let printWindow=window.open('','_blank'); 
            
            let html=`<html><head><style>
                @page { size: ${document.getElementById('printer_size').value==="75x75" ? "75mm 75mm" : "100mm 150mm"}; margin: 0; } 
                body { margin: 0; padding: 0; font-family: Arial, sans-serif; text-align: center; color: black; background: white; width: 100%; height: 100%; } 
                .page { width: 100%; height: 100%; box-sizing: border-box; padding-top: 10px; page-break-after: always; display: block; }
                h2 { margin: 0 0 3px 0; font-size: 26px; text-transform: uppercase; font-weight: 900; line-height: 1; }
                .codes { margin: 0 0 5px 0; font-size: 15px; font-weight: bold; }
                img { width: 160px; height: 160px; margin: 0 0 5px 0; }
                .bc-text { margin: 0 0 5px 0; font-size: 20px; font-weight: 900; }
                .details { margin: 0 0 2px 0; font-size: 15px; font-weight: bold; }
            </style></head><body>`; 
            
            queue.forEach(q=>{ 
                const dObj = new Date(q.dateRaw); const dd = String(dObj.getDate()).padStart(2, '0'); const mm = String(dObj.getMonth()+1).padStart(2, '0'); const yyyy = dObj.getFullYear(); const dispDate = `${dd}/${mm}/${yyyy}`;
                for(let i = q.startNo; i <= q.endNo; i++){ 
                    let bc=`${q.dateFmt}/${q.ingCode}/${q.venCode}/${i}`; 
                    html+=`
                    <div class="page">
                        <h2>${q.ingName}</h2>
                        <div class="codes">Mat: ${q.ingCode} | Ven: ${q.venCode}</div>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${bc}">
                        <div class="bc-text">${bc}</div>
                        <div class="details">Date: ${dispDate}</div>
                        <div class="details">Net Wt: ${q.weight} KG</div>
                    </div>`; 
                } 
            }); 
            
            html+=`</body><script>window.onload=()=>{window.print();window.close();}<\/script></html>`; 
            printWindow.document.write(html); printWindow.document.close(); queue=[]; renderQueue(); 
            document.getElementById('log_db_check').checked = true;
        }
    </script>
</body>
</html>
