<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - RM Inwarding</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding-bottom: 50px; }
        .nav-top { background: #ffffff; border-bottom: 4px solid #ea580c; padding: 15px 25px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .brand { display: flex; align-items: center; gap: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 900; color: #0f172a; letter-spacing: 1px; text-decoration: none; text-transform: uppercase;}
        .brand img { height: 40px; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; width: 100%; justify-content: center; }
        @media(min-width: 900px){ .nav-links { width: auto; margin-top: 0; } }
        .nav-btn { text-decoration: none; padding: 10px 15px; color: #64748b; font-weight: 800; font-size: 14px; text-transform: uppercase; border-radius: 8px; transition: 0.2s; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .nav-btn:hover, .nav-btn.active { background: #0f172a; color: #ffffff; border-color: #0f172a; box-shadow: 0 4px 10px rgba(15,23,42,0.2);}
        .nav-btn.logout { background: #fee2e2; color: #ef4444; border-color: #fca5a5; } .nav-btn.logout:hover { background: #ef4444; color: #ffffff; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr; gap: 30px;}
        @media(min-width: 900px){ .container{grid-template-columns: 1fr 1fr;} }
        
        .card { background: #ffffff; border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; border-top: 6px solid #ea580c;}
        h2 { font-family: 'Space Grotesk', sans-serif; color: #0f172a; margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; font-size: 22px; text-transform: uppercase;}
        
        label { display: block; font-weight: 900; color: #475569; font-size: 14px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
        input, select { width: 100%; padding: 16px; box-sizing: border-box; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 16px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #0f172a; margin-bottom: 25px; background: #f8fafc; transition: 0.2s; }
        input:focus, select:focus { border-color: #ea580c; background: #ffffff; outline: none; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.2); }
        
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; margin-bottom: 15px; }
        .btn-primary { background: #ea580c; color: #ffffff; box-shadow: 0 6px 15px rgba(234, 88, 12, 0.3); }
        .btn-primary:hover { background: #c2410c; transform: translateY(-2px); }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 2px solid #cbd5e1; }
        .btn-print { background: #10b981; color: white; box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3); font-size: 18px;}
        .btn-print:hover { background: #059669; transform: translateY(-2px); }

        .print-preview { background: #ffffff; color: #000000; padding: 30px; text-align: center; font-family: sans-serif; border-radius: 12px; margin-bottom: 25px; border: 3px solid #cbd5e1; box-shadow: inset 0 0 20px rgba(0,0,0,0.05);}
        #queueList { background: #f8fafc; padding: 20px; border-radius: 12px; border: 2px solid #e2e8f0; min-height: 120px; margin-bottom: 25px; font-family: 'Space Grotesk', monospace; color: #0f172a; font-size: 15px; font-weight: 700;}
    </style>
</head>
<body>
    <nav class="nav-top">
        <a href="index.html" class="brand"><img src="logo.png" alt="Kilrr" onerror="this.style.display='none'"> Factory OS</a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">🏠 HUB</a>
            <a href="inwarding.html" class="nav-btn active">📦 INWARD</a>
            <a href="scanner.html" class="nav-btn">🏭 SCANNER</a>
            <a href="audit.html" class="nav-btn">📋 AUDIT</a>
            <a href="dashboard.html" class="nav-btn">📊 DASHBOARD</a>
            <a href="master.html" class="nav-btn">⚙️ MASTER</a>
            <a href="/api/logout" class="nav-btn logout">🚪 EXIT</a>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <h2>Material Intake Form</h2>
            <div style="display:flex; gap:15px;">
                <div style="flex:1;"><label>Date Received</label><input type="date" id="date"></div>
                <div style="flex:1;"><label>Net Wt / Bag (KG)</label><input type="number" id="wt" placeholder="e.g. 25" oninput="updatePreview()"></div>
            </div>
            
            <label>Ingredient</label>
            <input list="ings_dl" id="ing_input" placeholder="Tap to select Material..." oninput="updatePreview()" autocomplete="off">
            <datalist id="ings_dl"></datalist>
            
            <label>Vendor</label>
            <input list="vens_dl" id="ven_input" placeholder="Tap to select Vendor..." oninput="updatePreview()" autocomplete="off">
            <datalist id="vens_dl"></datalist>
            
            <label>Total Bags Received</label>
            <input type="number" id="packs" placeholder="e.g. 10" oninput="updatePreview()">
            <button class="btn-primary" onclick="addToQueue()">➕ Stage for Printing</button>
            <button class="btn-secondary" onclick="clearForm()">Reset Form</button>
        </div>
        <div class="card">
            <h2>Thermal Print Queue</h2>
            <label>Select Printer Config</label>
            <select id="printer_size"><option value="75x75">75mm x 75mm (Industrial)</option><option value="100x150">100mm x 150mm (Large)</option></select>
            <label>Live Label Preview</label>
            <div class="print-preview" id="previewBox"><span style="color:#94a3b8; font-weight:bold;">Awaiting material selection...</span></div>
            <label>Staged Batches</label>
            <div id="queueList">Queue is empty.</div>
            <button class="btn-print" onclick="printAll()">🖨️ PRINT & LOG TO DATABASE</button>
        </div>
    </div>
    <script>
        let queue=[]; document.getElementById('date').valueAsDate=new Date();
        window.onload=async()=>{ 
            const iRes=await fetch('/get-ingredients'); const ingredients=await iRes.json();
            const vRes=await fetch('/get-vendors'); const vendors=await vRes.json(); 
            const iList = document.getElementById('ings_dl');
            ingredients.forEach(i => { let opt = document.createElement('option'); opt.value = `${i.ingredient_name} [${i.product_code}]`; iList.appendChild(opt); });
            const vList = document.getElementById('vens_dl');
            vendors.forEach(v => { let opt = document.createElement('option'); opt.value = `${v.vendor_name} [${v.vendor_code}]`; vList.appendChild(opt); });
        };

        function parseInput(val) { const match = val.match(/\[(.*?)\]/); return { name: val.split(' [')[0], code: match ? match[1] : '' }; }

        function updatePreview() {
            const iData = parseInput(document.getElementById('ing_input').value);
            const vData = parseInput(document.getElementById('ven_input').value);
            const dateRaw = document.getElementById('date').value; const dateFmt = dateRaw.replace(/-/g,'');
            const packs = document.getElementById('packs').value || "1";
            const wt = document.getElementById('wt').value || "0";
            
            if(!iData.code || !vData.code) { document.getElementById('previewBox').innerHTML=`<span style="color:#94a3b8;font-weight:bold;">Awaiting material selection...</span>`; return; }
            
            // Format DD/MM/YYYY
            const dObj = new Date(dateRaw);
            const displayDate = `${String(dObj.getDate()).padStart(2, '0')}/${String(dObj.getMonth()+1).padStart(2, '0')}/${dObj.getFullYear()}`;

            document.getElementById('previewBox').innerHTML=`<h3 style="margin:0;font-size:24px;text-transform:uppercase;">${iData.name}</h3><p style="margin:5px 0;font-size:16px;"><strong>${iData.code}</strong> | V: ${vData.code}</p><div style="font-size:20px;margin-top:15px;font-weight:bold;">${dateFmt}/${iData.code}/${vData.code}/1<br><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${dateFmt}/${iData.code}/${vData.code}/1" style="margin-top:10px; border:2px solid black; padding:5px;"></div><p style="font-size:15px;margin:10px 0 2px 0;">Date: <strong>${displayDate}</strong></p><p style="font-size:15px;margin:2px 0;">Net Wt: <strong>${wt} KG</strong></p><p style="font-size:15px;margin:2px 0;">Bag 1 of ${packs}</p>`;
        }

        function addToQueue(){ 
            const iData = parseInput(document.getElementById('ing_input').value);
            const vData = parseInput(document.getElementById('ven_input').value);
            const date = document.getElementById('date').value; const wt = document.getElementById('wt').value; const packs = document.getElementById('packs').value; 
            if(!iData.code || !vData.code || !wt || !packs) return alert("Fill all fields correctly using the dropdown!"); 
            queue.push({dateRaw:date, dateFmt:date.replace(/-/g,''), ingName:iData.name, ingCode:iData.code, venName:vData.name, venCode:vData.code, weight:wt, packs:packs}); 
            renderQueue(); clearForm(false); 
        }

        function renderQueue(){ 
            if(queue.length===0){document.getElementById('queueList').innerHTML="Queue is empty.";return;} 
            document.getElementById('queueList').innerHTML=queue.map((q,idx)=>`<div style="margin-bottom:10px; border-bottom:2px solid #e2e8f0; padding-bottom:10px; color:#ea580c;">[${idx+1}] ${q.packs}x ${q.ingName} (${q.weight}kg)</div>`).join(''); 
        }

        function clearForm(full=true){ 
            document.getElementById('ing_input').value=''; document.getElementById('packs').value=''; 
            if(full){document.getElementById('ven_input').value=''; document.getElementById('wt').value='';} 
            updatePreview();
        }

        async function printAll(){ 
            if(queue.length===0) return alert("Queue empty!"); 
            await fetch('/log-inwarding',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({queue})}); 
            let printWindow=window.open('','_blank'); 
            let html=`<html><head><style>@page{size:${document.getElementById('printer_size').value==="75x75"?"75mm 75mm":"100mm 150mm"};margin:0;} body{margin:0;font-family:sans-serif;text-align:center;} .page{width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;page-break-after:always;}</style></head><body>`; 
            queue.forEach(q=>{ 
                const dObj = new Date(q.dateRaw); const dispDate = `${String(dObj.getDate()).padStart(2, '0')}/${String(dObj.getMonth()+1).padStart(2, '0')}/${dObj.getFullYear()}`;
                for(let i=1;i<=q.packs;i++){ 
                    let bc=`${q.dateFmt}/${q.ingCode}/${q.venCode}/${i}`; 
                    html+=`<div class="page"><h2 style="margin:2px 0;font-size:24px;text-transform:uppercase;">${q.ingName}</h2><p style="margin:2px 0;font-size:16px;">Code: <strong>${q.ingCode}</strong> | V: <strong>${q.venCode}</strong></p><img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${bc}" style="margin:5px 0;"><p style="margin:2px 0;font-size:14px;font-weight:bold;">${bc}</p><p style="margin:2px 0;font-size:14px;">Date: ${dispDate}</p><p style="margin:2px 0;font-size:14px;">N.W: ${q.weight} KG | Bag ${i} of ${q.packs}</p></div>`; 
                } 
            }); 
            html+=`</body><script>window.onload=()=>{window.print();window.close();}<\/script></html>`; 
            printWindow.document.write(html); printWindow.document.close(); queue=[]; renderQueue(); 
        }
    </script>
</body>
</html>
