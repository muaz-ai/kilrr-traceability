<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Factory Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0f172a; color: #f8fafc; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a); }
        .hub-container { width: 90%; max-width: 800px; padding: 20px; text-align: center; }
        .logo-box { margin-bottom: 40px; }
        .logo-box img { height: 60px; background: white; padding: 10px 20px; border-radius: 16px; box-shadow: 0 0 30px rgba(14, 165, 233, 0.2); }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; margin-top: 20px; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 40px; }
        
        .app-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; border-radius: 20px; padding: 30px 20px; text-decoration: none; color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; gap: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .app-card:hover { transform: translateY(-5px); border-color: #38bdf8; background: rgba(30, 41, 59, 0.9); box-shadow: 0 15px 30px rgba(56, 189, 248, 0.15); }
        .icon { font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .title { font-weight: 800; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        .logout-card { margin-top: 40px; border-color: #ef4444; background: rgba(127, 29, 29, 0.2); grid-column: 1 / -1; padding: 20px; flex-direction: row; justify-content: center; }
        .logout-card:hover { border-color: #f87171; background: rgba(127, 29, 29, 0.4); box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2); }
        
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <div class="hub-container">
        <div class="logo-box">
            <img src="logo.png" alt="Kilrr" onerror="this.style.display='none'">
            <h1>Factory Os</h1>
        </div>
        
        <div class="grid">
            <a href="inwarding.html" class="app-card">
                <span class="icon">📦</span>
                <span class="title">Inwarding</span>
            </a>
            <a href="scanner.html" class="app-card" style="border-color: #38bdf8; background: rgba(14, 165, 233, 0.1);">
                <span class="icon">🏭</span>
                <span class="title">Batch Scanner</span>
            </a>
            <a href="audit.html" class="app-card">
                <span class="icon">📋</span>
                <span class="title">Stock Audit</span>
            </a>
            <a href="dashboard.html" class="app-card">
                <span class="icon">📊</span>
                <span class="title">Dashboard</span>
            </a>
            <a href="master.html" class="app-card">
                <span class="icon">⚙️</span>
                <span class="title">Master Data</span>
            </a>
            
            <a href="/api/logout" class="app-card logout-card">
                <span class="icon" style="font-size: 24px;">🚪</span>
                <span class="title" style="color: #fca5a5;">Secure Logout</span>
            </a>
        </div>
    </div>
</body>
</html>
