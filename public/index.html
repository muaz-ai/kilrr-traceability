<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Factory Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding-bottom: 50px; }
        
        /* 🔥 THE PREMIUM NAVBAR 🔥 */
        .nav-top { background: #ffffff; border-bottom: 6px solid #ea580c; padding: 20px 35px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .brand { display: flex; align-items: center; gap: 15px; font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: 1px; text-decoration: none; text-transform: uppercase;}
        .brand img { height: 45px; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; width: 100%; justify-content: center; }
        @media(min-width: 1000px){ .nav-links { width: auto; margin-top: 0; } }
        .nav-btn { text-decoration: none; padding: 12px 20px; color: #475569; font-weight: 900; font-size: 15px; text-transform: uppercase; border-radius: 10px; transition: 0.3s; background: #f1f5f9; border: 2px solid transparent; letter-spacing: 1px;}
        .nav-btn:hover { background: #fff7ed; color: #ea580c; border-color: #ffedd5; transform: translateY(-2px);}
        .nav-btn.active { background: #ea580c; color: #ffffff; box-shadow: 0 6px 15px rgba(234, 88, 12, 0.3); }
        .nav-btn.logout { background: #fef2f2; color: #ef4444; } .nav-btn.logout:hover { background: #ef4444; color: #ffffff; border-color: #ef4444;}

        .container { max-width: 1300px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 35px; margin-top: 50px; }
        
        .app-card { background: #ffffff; border: 2px solid #e2e8f0; border-radius: 24px; padding: 60px 40px; text-decoration: none; color: #0f172a; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .app-card:hover { transform: translateY(-10px); border-color: #ea580c; box-shadow: 0 25px 50px rgba(234,88,12,0.15); }
        .icon { font-size: 70px; background: #fff7ed; padding: 25px; border-radius: 24px; border: 2px solid #ffedd5; color: #ea580c; display: flex; justify-content: center; align-items: center; height: 80px; width: 80px;}
        .title { font-weight: 900; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; font-family: 'Space Grotesk', sans-serif;}
    </style>
</head>
<body>
    <nav class="nav-top">
        <a href="index.html" class="brand"><img src="logo.png" alt="Kilrr" onerror="this.style.display='none'"> Factory OS</a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn active">🏠 HUB</a>
            <a href="inwarding.html" class="nav-btn">📦 INWARD</a>
            <a href="scanner.html" class="nav-btn">🏭 SCANNER</a>
            <a href="audit.html" class="nav-btn">📋 AUDIT</a>
            <a href="dashboard.html" class="nav-btn">📊 DASHBOARD</a>
            <a href="master.html" class="nav-btn">⚙️ MASTER</a>
            <a href="/api/logout" class="nav-btn logout">🚪 EXIT</a>
        </div>
    </nav>
    <div class="container">
        <h1 style="font-family:'Space Grotesk', sans-serif; font-size:38px; color:#ea580c; text-transform:uppercase; letter-spacing: 2px; margin-bottom: 10px;">Select Module</h1>
        <p style="color: #64748b; font-size: 18px; font-weight: 600; margin-top: 0;">Kilrr Master Traceability System</p>
        <div class="grid">
            <a href="inwarding.html" class="app-card"><div class="icon">📦</div><span class="title">RM Inwarding</span></a>
            <a href="scanner.html" class="app-card"><div class="icon">🏭</div><span class="title">Batch Scanner</span></a>
            <a href="audit.html" class="app-card"><div class="icon">📋</div><span class="title">Stock Audit</span></a>
            <a href="dashboard.html" class="app-card"><div class="icon">📊</div><span class="title">Manager Dashboard</span></a>
            <a href="master.html" class="app-card"><div class="icon">⚙️</div><span class="title">Master Data</span></a>
        </div>
    </div>
</body>
</html>
