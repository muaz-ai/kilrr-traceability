<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Secure Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; margin: 0; background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #ffffff; padding: 50px 40px; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        .login-card img { height: 60px; margin-bottom: 20px; }
        h1 { color: #0f172a; margin-top: 0; font-weight: 900; text-transform: uppercase; font-size: 24px; margin-bottom: 5px;}
        p { color: #64748b; font-size: 14px; font-weight: 600; margin-bottom: 30px; }
        input { width: 100%; padding: 18px; box-sizing: border-box; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 18px; font-family: 'Space Grotesk', sans-serif; font-weight: 800; margin-bottom: 20px; text-align: center; letter-spacing: 2px;}
        input:focus { border-color: #0ea5e9; outline: none; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.2); }
        button { width: 100%; border: none; font-family: 'Outfit', sans-serif; font-weight: 900; cursor: pointer; color: white; border-radius: 12px; padding: 20px; font-size: 18px; background: linear-gradient(135deg, #0ea5e9, #3b82f6); text-transform: uppercase; transition: 0.2s;}
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4); }
        #error_msg { color: #ef4444; font-weight: 800; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo.png" alt="Kilrr Logo" onerror="this.style.display='none'">
        <h1>Traceability Vault</h1>
        <p>Authorized Personnel Only</p>
        
        <input type="password" id="pass_input" placeholder="Enter Access Code">
        <button onclick="attemptLogin()">🔓 Unlock System</button>
        <div id="error_msg">❌ Invalid Access Code</div>
    </div>

    <script>
        document.getElementById('pass_input').addEventListener('keypress', function(e) { if(e.key === 'Enter') attemptLogin(); });

        async function attemptLogin() {
            const pwd = document.getElementById('pass_input').value;
            if(!pwd) return;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
            const data = await res.json();
            
            if(data.success) {
                if(data.role === 'admin') window.location.href = '/dashboard.html';
                else window.location.href = '/';
            } else {
                const err = document.getElementById('error_msg');
                err.style.display = 'block';
                document.getElementById('pass_input').value = '';
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>
</html>
