<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Secure Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; margin: 0; background: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #ffffff; padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); width: 90%; max-width: 420px; text-align: center; border-top: 8px solid #ea580c; border-bottom: 8px solid #0f172a; }
        .login-card img { height: 75px; margin-bottom: 20px; }
        h1 { color: #0f172a; margin-top: 0; font-weight: 900; text-transform: uppercase; font-size: 26px; margin-bottom: 5px; font-family: 'Space Grotesk', sans-serif;}
        p { color: #64748b; font-size: 15px; font-weight: 800; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 1px;}
        input { width: 100%; padding: 20px; box-sizing: border-box; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 20px; font-family: 'Space Grotesk', sans-serif; font-weight: 800; margin-bottom: 25px; text-align: center; letter-spacing: 3px; background: #f1f5f9; color:#0f172a;}
        input:focus { border-color: #ea580c; outline: none; background: #ffffff; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15); }
        button { width: 100%; border: none; font-family: 'Outfit', sans-serif; font-weight: 900; cursor: pointer; color: white; border-radius: 12px; padding: 20px; font-size: 18px; background: #ea580c; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px;}
        button:hover { background: #c2410c; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(234, 88, 12, 0.3); }
        #error_msg { color: #ef4444; font-weight: 800; font-size: 15px; margin-top: 20px; display: none; background: #fee2e2; padding: 10px; border-radius: 8px;}
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo.png" alt="Kilrr Logo" onerror="this.style.display='none'">
        <h1>Factory OS</h1>
        <p>Authorized Access Only</p>
        
        <input type="password" id="pass_input" placeholder="Enter Access Code">
        <button onclick="attemptLogin()">🔓 Unlock System</button>
        <div id="error_msg">❌ Invalid Access Code</div>
    </div>

    <script>
        document.getElementById('pass_input').addEventListener('keypress', function(e) { if(e.key === 'Enter') attemptLogin(); });
        async function attemptLogin() {
            const pwd = document.getElementById('pass_input').value; if(!pwd) return;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
            const data = await res.json();
            if(data.success) {
                window.location.href = '/index.html'; // Always go to HUB
            } else {
                const err = document.getElementById('error_msg'); err.style.display = 'block';
                document.getElementById('pass_input').value = ''; setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>
</html>
