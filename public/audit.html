<!DOCTYPE html>
<html>
<head>
    <title>Kilrr - Stock Audit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin:0; background:#0f172a; color:#f8fafc; font-family:'Outfit',sans-serif; min-height:100vh; padding-bottom:40px;}
        nav { background:rgba(15,23,42,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #334155; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(0,0,0,0.3);}
        .nav-logo { display:flex; align-items:center; gap:15px; text-decoration:none; color:white;}
        .nav-logo img { height:35px; background:white; padding:4px; border-radius:6px; }
        .nav-logo span { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; letter-spacing:1px; text-transform:uppercase;}
        .home-btn { background:rgba(56,189,248,0.1); border:1px solid #38bdf8; color:#38bdf8; padding:8px 16px; border-radius:8px; text-decoration:none; font-weight:800; font-size:14px; transition:0.3s;}
        
        .card { max-width:600px; margin:30px auto; background:rgba(30,41,59,0.6); backdrop-filter:blur(10px); padding:30px; border-radius:20px; border:1px solid #334155; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
        h2 { margin-top:0; font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#38bdf8; margin-bottom:25px; border-bottom:1px solid #334155; padding-bottom:15px;}
        
        label { display:block; font-weight:800; margin-bottom:8px; color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
        input { width:100%; padding:15px; box-sizing:border-box; border-radius:12px; border:1px solid #475569; font-size:16px; background:rgba(15,23,42,0.6); color:white; font-family:'Space Grotesk',sans-serif; margin-bottom:20px; text-align:center;}
        input:focus { border-color:#38bdf8; outline:none; box-shadow:0 0 15px rgba(56,189,248,0.2); }
        
        button { width:100%; border:none; font-family:'Outfit',sans-serif; font-weight:900; cursor:pointer; color:#0f172a; border-radius:12px; padding:18px; font-size:16px; transition:0.3s; text-transform:uppercase; letter-spacing:1px; margin-bottom:15px; }
        .btn-primary { background:linear-gradient(135deg, #38bdf8, #818cf8); box-shadow:0 10px 20px rgba(56,189,248,0.2); }
        .btn-update { background:linear-gradient(135deg, #10b981, #059669); color:white; }
        
        .info-box { background:rgba(15,23,42,0.6); padding:20px; border-radius:12px; border:1px solid #334155; margin-bottom:20px; text-align:center;}
        .info-box p { margin:5px 0; color:#94a3b8; font-size:14px; text-transform:uppercase;}
        .info-box span { font-family:'Space Grotesk',sans-serif; font-size:24px; color:white; font-weight:700;}
        
        #log { max-height:250px; overflow-y:auto; background:rgba(15,23,42,0.4); border:1px solid #334155; padding:15px; border-radius:12px; margin-top:20px;}
        .log-item { display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #1e293b; background:rgba(30,41,59,0.8); border-radius:8px; margin-bottom:8px; font-size:14px;}
        .log-item strong { color:#38bdf8; font-family:monospace; font-size:15px;}
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><img src="logo.png" alt="Kilrr" onerror="this.style.display='none'"><span>INVENTORY AUDIT</span></a>
        <a href="index.html" class="home-btn">🏠 Hub</a>
    </nav>
    <div class="card" id="setup">
        <h2>Initiate Audit Session</h2>
        <label>Session Name / Auditor</label>
        <input type="text" id="session" placeholder="e.g. MonthEnd-April">
        <button class="btn-primary" onclick="startSession()">🔓 Open Audit Terminal</button>
    </div>
    <div class="card" id="work" style="display:none;">
        <h2 id="sess_title"></h2>
        <label>1. Scan Raw Material Barcode</label>
        <input type="text" id="scan_input" placeholder="Scan Tag...">
        
        <div class="info-box" id="info_box" style="display:none;">
            <p>Target Material</p>
            <span id="prod_code" style="color:#38bdf8;">---</span><br>
            <p style="margin-top:10px;">Previous Weight</p>
            <span id="old_wt">-- KG</span>
        </div>
        
        <label>2. Enter Current Weight (KG)</label>
        <input type="number" id="new_wt" placeholder="Enter physically weighed amount...">
        <button class="btn-update" onclick="submitAudit()">✅ UPDATE DATABASE</button>
        
        <h3 style="color:#94a3b8; font-size:14px; margin-top:30px; border-bottom:1px solid #334155; padding-bottom:10px;">Session History</h3>
        <div id="log"></div>
    </div>
    <script>
        let sessionName = "", currentTag = "", currentProdCode = "", originalWt = 0;
        document.getElementById('scan_input').addEventListener('keypress', function(e) { if(e.key === 'Enter') processScan(); });
        function startSession() {
            sessionName = document.getElementById('session').value.trim();
            if(!sessionName) return alert("Enter session name!");
            document.getElementById('setup').style.display = 'none'; document.getElementById('work').style.display = 'block';
            document.getElementById('sess_title').innerText = "Session: " + sessionName.toUpperCase();
            loadLog(); setTimeout(() => document.getElementById('scan_input').focus(), 500);
        }
        async function processScan() {
            const tag = document.getElementById('scan_input').value.trim(); if(!tag) return;
            currentTag = tag; const parts = tag.split('/'); currentProdCode = parts.length >= 2 ? parts[1] : tag;
            const res = await fetch('/get-inventory'); const inv = await res.json();
            const existing = inv.find(i => i.rm_tag === tag);
            originalWt = existing ? existing.current_weight : (parts.length >= 4 ? parseFloat(parts[3]) : 0);
            document.getElementById('info_box').style.display = 'block';
            document.getElementById('prod_code').innerText = existing && existing.ingredient_name ? `${existing.ingredient_name} (${currentProdCode})` : currentProdCode;
            document.getElementById('old_wt').innerText = `${originalWt} KG`;
            document.getElementById('new_wt').focus();
        }
        async function submitAudit() {
            const nw = document.getElementById('new_wt').value;
            if(!nw || !currentTag) return alert("Scan tag and enter new weight!");
            await fetch('/audit-stock', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ session_name: sessionName, rm_tag: currentTag, product_code: currentProdCode, original_weight: originalWt, current_weight: parseFloat(nw) }) });
            document.getElementById('scan_input').value = ''; document.getElementById('new_wt').value = ''; document.getElementById('info_box').style.display = 'none'; currentTag = "";
            loadLog(); document.getElementById('scan_input').focus();
        }
        async function loadLog() {
            const res = await fetch(`/audit-session/${sessionName}`); const data = await res.json();
            document.getElementById('log').innerHTML = data.map(d => `<div class="log-item"><div><strong>${d.rm_tag}</strong><br><span style="color:#94a3b8; font-size:12px;">${d.ingredient_name||d.product_code}</span></div><div style="text-align:right;"><span style="color:#34d399; font-weight:bold;">${d.current_weight} KG</span><br><span style="color:#ef4444; text-decoration:line-through; font-size:12px;">was ${d.original_weight}</span></div></div>`).join('');
        }
    </script>
</body>
</html>
